<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Export Attendance | Project Netra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .export-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    </style>
</head>
<body>
<div class="export-card">
    <h3 class="fw-bold text-center mb-4">Export Reports</h3>
    <p class="text-muted text-center small mb-4">Select a date range to download the attendance logs in CSV format.</p>
    
    <form action="/download-csv" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold small text-uppercase">From Date</label>
            <input type="date" name="from_date" class="form-control form-control-lg" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold small text-uppercase">To Date</label>
            <input type="date" name="to_date" class="form-control form-control-lg" required>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg fw-bold">Download CSV</button>
            <a href="/" class="btn btn-light btn-lg">Back to Dashboard</a>
        </div>
    </form>
</div>
</body>
</html>
